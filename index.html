<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080604">
  <title>PubKey Bar Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&family=Barlow+Condensed:wght@700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
       PUBKEY BAR REFERENCE — CMS Edition
       ═══════════════════════════════════════════════ */

    :root {
      --spring: cubic-bezier(0.2, 0.9, 0.3, 1.0);

      /* Surfaces */
      --surface-0: #080604;
      --surface-1: #0e0c0a;
      --surface-2: #141210;
      --surface-3: #1a1816;
      --surface-4: #221f1c;
      --surface-5: #2a2724;

      /* Material */
      --material: rgba(14, 12, 10, 0.85);

      /* Brand */
      --orange: #eb5528;
      --orange-vibrant: #ff6633;
      --orange-dim: rgba(235, 85, 40, 0.08);
      --orange-glow: rgba(255, 102, 51, 0.25);

      /* Text */
      --text-primary: #ede8e0;
      --text-secondary: #8c8478;
      --text-tertiary: #5c564e;

      /* Separators */
      --separator: rgba(200, 170, 130, 0.06);

      /* Safe areas */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      /* Fonts */
      --font-body: 'Barlow', sans-serif;
      --font-headline: 'Barlow Condensed', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--surface-0);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      height: 100dvh;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ═══════════════════════════════
       TOP BAR
       ═══════════════════════════════ */
    .top-bar {
      background: var(--material);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--separator);
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .top-bar::after {
      content: '';
      position: absolute;
      bottom: -0.5px;
      left: 0; right: 0;
      height: 0.5px;
      background: linear-gradient(90deg,
        transparent 5%,
        rgba(235, 85, 40, 0.15) 20%,
        rgba(235, 85, 40, 0.25) 50%,
        rgba(235, 85, 40, 0.15) 80%,
        transparent 95%
      );
    }

    .top-bar h1 {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-align: center;
    }

    /* ═══════════════════════════════
       SEARCH
       ═══════════════════════════════ */
    .search-wrap {
      padding: 8px 16px;
      background: var(--surface-1);
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      background: var(--surface-3);
      border: 1px solid rgba(200, 170, 130, 0.08);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 200ms ease;
    }

    .search-input::placeholder {
      color: var(--text-tertiary);
    }

    .search-input:focus {
      border-color: rgba(235, 85, 40, 0.3);
    }

    /* ═══════════════════════════════
       SUB-TABS
       ═══════════════════════════════ */
    .sub-tabs {
      display: flex;
      border-bottom: 0.5px solid var(--separator);
      background: var(--surface-1);
      flex-shrink: 0;
    }

    .sub-tab {
      flex: 1;
      padding: 12px 8px;
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      text-align: center;
      color: var(--text-tertiary);
      background: none;
      border: none;
      border-bottom: 1.5px solid transparent;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .sub-tab.active {
      color: var(--orange);
      border-bottom-color: var(--orange);
    }

    /* ═══════════════════════════════
       SCROLLABLE LIST
       ═══════════════════════════════ */
    .list-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ═══════════════════════════════
       COCKTAIL ROWS
       ═══════════════════════════════ */
    .cocktail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 16px;
      border-bottom: 1px solid rgba(200, 170, 130, 0.07);
      cursor: pointer;
      transition: background-color 120ms ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      animation: itemIn 150ms var(--spring) both;
    }

    .cocktail-row:nth-child(even) {
      background-color: rgba(200, 170, 130, 0.015);
    }

    .cocktail-row::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      width: 2.5px; height: 0;
      background: var(--orange);
      border-radius: 2px;
      transform: translateY(-50%);
      transition: height 300ms var(--spring), opacity 300ms var(--spring);
      opacity: 0;
    }

    .cocktail-row:hover::before { height: 60%; opacity: 1; }
    .cocktail-row:active { background-color: rgba(200, 170, 130, 0.06) !important; }
    .cocktail-row:hover { background-color: rgba(235, 85, 40, 0.03); }

    .cocktail-name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--text-primary);
    }

    .cocktail-meta {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      margin-top: 4px;
      opacity: 0.7;
    }

    .cocktail-chevron {
      color: var(--text-tertiary);
      opacity: 0.15;
      font-size: 14px;
      transition: transform 250ms var(--spring), opacity 250ms var(--spring);
      flex-shrink: 0;
      margin-left: 12px;
    }

    .cocktail-row:hover .cocktail-chevron {
      transform: translateX(3px);
      opacity: 0.4;
    }

    /* Section headers in list */
    .section-header {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: 20px 16px 10px;
      border-bottom: 1px solid rgba(235, 85, 40, 0.10);
      position: relative;
    }

    .section-header::after {
      content: '';
      position: absolute;
      bottom: -0.5px;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, var(--orange) 0%, transparent 60%);
      opacity: 0.2;
    }

    /* ═══════════════════════════════
       COCKTAIL DETAIL
       ═══════════════════════════════ */
    .detail-view {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--surface-0);
      z-index: 100;
      display: none;
      flex-direction: column;
    }

    .detail-view.open {
      display: flex;
    }

    .detail-header {
      background: var(--material);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--separator);
      padding: calc(var(--safe-top) + 8px) 16px 12px;
      flex-shrink: 0;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--orange);
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 10px;
      transition: background-color 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active {
      background-color: var(--surface-3);
    }

    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 16px calc(var(--safe-bottom) + 24px);
    }

    .detail-title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 30px;
      letter-spacing: -0.015em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .detail-era {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      margin-bottom: 24px;
    }

    .detail-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--separator);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .meta-cell {
      background: var(--surface-2);
      padding: 14px 12px;
      text-align: center;
    }

    .meta-label {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    .meta-value {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .detail-section-title {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 14px;
    }

    .ingredient-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid rgba(200, 170, 130, 0.05);
    }

    .ingredient-name {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
    }

    .ingredient-amount {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--orange);
      opacity: 0.8;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .build-method {
      margin-top: 28px;
      margin-bottom: 28px;
    }

    .build-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .garnish-block {
      margin-bottom: 28px;
    }

    .garnish-value {
      font-size: 15px;
      color: var(--text-primary);
    }

    .history-block {
      margin-top: 8px;
      padding-top: 24px;
      border-top: 1px solid var(--separator);
    }

    .history-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-tertiary);
    }

    .tags-block {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-pill {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      background: var(--orange-dim);
      color: var(--orange);
      border-radius: 100px;
    }

    /* ═══════════════════════════════
       BOTTOM NAV
       ═══════════════════════════════ */
    .bottom-nav {
      display: flex;
      background: var(--material);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--separator);
      padding-bottom: var(--safe-bottom);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .bottom-nav::before {
      content: '';
      position: absolute;
      top: -0.5px;
      left: 0; right: 0;
      height: 0.5px;
      background: linear-gradient(90deg,
        transparent 10%,
        rgba(200, 170, 130, 0.08) 30%,
        rgba(200, 170, 130, 0.12) 50%,
        rgba(200, 170, 130, 0.08) 70%,
        transparent 90%
      );
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px;
      min-height: 56px;
      background: none;
      border: none;
      cursor: pointer;
      transition: transform 150ms var(--spring);
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:active { transform: scale(0.88); }

    .nav-icon {
      font-size: 22px;
      transition: filter 200ms ease;
    }

    .nav-label {
      font-family: var(--font-headline);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-btn.inactive .nav-icon {
      filter: grayscale(0.6) opacity(0.6);
    }

    .nav-btn.inactive .nav-label {
      color: var(--text-tertiary);
      opacity: 0.6;
    }

    .nav-btn.active .nav-icon {
      filter: drop-shadow(0 1px 6px var(--orange-glow));
    }

    .nav-btn.active .nav-label {
      color: var(--orange);
    }

    /* ═══════════════════════════════
       PLACEHOLDER TABS
       ═══════════════════════════════ */
    .placeholder-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      font-family: var(--font-headline);
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════
       EMPTY STATE
       ═══════════════════════════════ */
    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 15px;
    }

    /* ═══════════════════════════════
       ANIMATIONS
       ═══════════════════════════════ */
    @keyframes itemIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stagger */
    .cocktail-row:nth-child(1)  { animation-delay: 0ms; }
    .cocktail-row:nth-child(2)  { animation-delay: 30ms; }
    .cocktail-row:nth-child(3)  { animation-delay: 55ms; }
    .cocktail-row:nth-child(4)  { animation-delay: 75ms; }
    .cocktail-row:nth-child(5)  { animation-delay: 90ms; }
    .cocktail-row:nth-child(6)  { animation-delay: 105ms; }
    .cocktail-row:nth-child(7)  { animation-delay: 115ms; }
    .cocktail-row:nth-child(8)  { animation-delay: 125ms; }
    .cocktail-row:nth-child(9)  { animation-delay: 130ms; }
    .cocktail-row:nth-child(n+10) { animation-delay: 135ms; }

    @media (prefers-reduced-motion: reduce) {
      .cocktail-row { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <h1>PubKey Bar Reference</h1>
    </div>

    <!-- Main content area, swapped per tab -->
    <div id="tab-cocktails" class="tab-content" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
      <div class="search-wrap">
        <input type="text" class="search-input" id="search" placeholder="Search cocktails...">
      </div>
      <div class="sub-tabs" id="sub-tabs">
        <button class="sub-tab active" data-filter="all">All</button>
        <button class="sub-tab" data-filter="gin">Gin</button>
        <button class="sub-tab" data-filter="whiskey">Whiskey</button>
        <button class="sub-tab" data-filter="rum">Rum</button>
        <button class="sub-tab" data-filter="tequila">Tequila</button>
        <button class="sub-tab" data-filter="vodka">Vodka</button>
        <button class="sub-tab" data-filter="brandy">Brandy</button>
        <button class="sub-tab" data-filter="other">Other</button>
      </div>
      <div class="list-scroll" id="cocktail-list"></div>
    </div>

    <div id="tab-spirits" class="tab-content" style="display:none; flex:1;">
      <div class="placeholder-tab">Spirits — Coming Soon</div>
    </div>
    <div id="tab-beer" class="tab-content" style="display:none; flex:1;">
      <div class="placeholder-tab">Beer — Coming Soon</div>
    </div>
    <div id="tab-wine" class="tab-content" style="display:none; flex:1;">
      <div class="placeholder-tab">Wine — Coming Soon</div>
    </div>
    <div id="tab-mods" class="tab-content" style="display:none; flex:1;">
      <div class="placeholder-tab">Mods — Coming Soon</div>
    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="cocktails">
        <span class="nav-icon">&#127864;</span>
        <span class="nav-label">Cocktails</span>
      </button>
      <button class="nav-btn inactive" data-tab="spirits">
        <span class="nav-icon">&#129347;</span>
        <span class="nav-label">Spirits</span>
      </button>
      <button class="nav-btn inactive" data-tab="beer">
        <span class="nav-icon">&#127866;</span>
        <span class="nav-label">Beer</span>
      </button>
      <button class="nav-btn inactive" data-tab="wine">
        <span class="nav-icon">&#127863;</span>
        <span class="nav-label">Wine</span>
      </button>
      <button class="nav-btn inactive" data-tab="mods">
        <span class="nav-icon">&#129514;</span>
        <span class="nav-label">Mods</span>
      </button>
    </nav>
  </div>

  <!-- Detail overlay -->
  <div class="detail-view" id="detail-view">
    <div class="detail-header">
      <button class="back-btn" id="back-btn">&#8592; Back</button>
    </div>
    <div class="detail-scroll" id="detail-content"></div>
  </div>

  <script>
    (function() {
      let cocktails = [];
      let currentFilter = 'all';
      let searchQuery = '';

      // Load data
      fetch('/data.json')
        .then(r => r.json())
        .then(data => {
          cocktails = data.cocktails || [];
          render();
        })
        .catch(() => {
          // Fallback: try relative path
          fetch('data.json')
            .then(r => r.json())
            .then(data => {
              cocktails = data.cocktails || [];
              render();
            });
        });

      // Format enum values for display
      function fmt(val) {
        if (!val) return '';
        return val.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      }

      // Filter + search
      function getFiltered() {
        return cocktails.filter(c => {
          const matchFilter = currentFilter === 'all' || c.spirit_base === currentFilter;
          const matchSearch = !searchQuery ||
            c.name.toLowerCase().includes(searchQuery) ||
            (c.spec && c.spec.ingredients && c.spec.ingredients.some(i =>
              i.ingredient.toLowerCase().includes(searchQuery)
            )) ||
            (c.tags && c.tags.some(t => t.includes(searchQuery)));
          return matchFilter && matchSearch;
        });
      }

      // Render cocktail list
      function render() {
        const list = document.getElementById('cocktail-list');
        const filtered = getFiltered();

        if (filtered.length === 0) {
          list.innerHTML = '<div class="empty-state">No cocktails found</div>';
          return;
        }

        list.innerHTML = filtered.map(c => `
          <div class="cocktail-row" data-id="${c.id}">
            <div>
              <div class="cocktail-name">${c.name}</div>
              <div class="cocktail-meta">${fmt(c.glass)} &middot; ${fmt(c.method)} &middot; ${fmt(c.ice)}</div>
            </div>
            <span class="cocktail-chevron">&#8250;</span>
          </div>
        `).join('');
      }

      // Render detail view
      function showDetail(id) {
        const c = cocktails.find(x => x.id === id);
        if (!c) return;

        const ingredients = (c.spec && c.spec.ingredients) || [];
        const methodDetail = (c.spec && c.spec.method_detail) || '';

        document.getElementById('detail-content').innerHTML = `
          <div class="detail-title">${c.name}</div>
          <div class="detail-era">${c.era || ''}</div>

          <div class="detail-meta-grid">
            <div class="meta-cell">
              <div class="meta-label">Glass</div>
              <div class="meta-value">${fmt(c.glass)}</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Method</div>
              <div class="meta-value">${fmt(c.method)}</div>
            </div>
            <div class="meta-cell">
              <div class="meta-label">Ice</div>
              <div class="meta-value">${fmt(c.ice)}</div>
            </div>
          </div>

          <div class="detail-section-title">Spec</div>
          ${ingredients.map(i => `
            <div class="ingredient-row">
              <span class="ingredient-name">${i.ingredient}</span>
              <span class="ingredient-amount">${i.amount}</span>
            </div>
          `).join('')}

          <div class="build-method">
            <div class="detail-section-title">Build</div>
            <div class="build-text">${methodDetail}</div>
          </div>

          <div class="garnish-block">
            <div class="detail-section-title">Garnish</div>
            <div class="garnish-value">${c.garnish || 'None'}</div>
          </div>

          ${c.history ? `
            <div class="history-block">
              <div class="detail-section-title">History</div>
              <div class="history-text">${c.history}</div>
            </div>
          ` : ''}

          ${c.tags && c.tags.length ? `
            <div class="tags-block">
              ${c.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}
            </div>
          ` : ''}
        `;

        document.getElementById('detail-view').classList.add('open');
      }

      // Event: cocktail row click
      document.getElementById('cocktail-list').addEventListener('click', e => {
        const row = e.target.closest('.cocktail-row');
        if (row) showDetail(row.dataset.id);
      });

      // Event: back button
      document.getElementById('back-btn').addEventListener('click', () => {
        document.getElementById('detail-view').classList.remove('open');
      });

      // Event: search
      document.getElementById('search').addEventListener('input', e => {
        searchQuery = e.target.value.toLowerCase().trim();
        render();
      });

      // Event: sub-tabs (spirit filter)
      document.getElementById('sub-tabs').addEventListener('click', e => {
        const btn = e.target.closest('.sub-tab');
        if (!btn) return;
        document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });

      // Event: bottom nav tabs
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;

          // Update nav state
          document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.remove('active');
            b.classList.add('inactive');
          });
          btn.classList.remove('inactive');
          btn.classList.add('active');

          // Show correct tab content
          document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
          const el = document.getElementById('tab-' + tab);
          if (el) {
            el.style.display = tab === 'cocktails' ? 'flex' : 'flex';
            el.style.flexDirection = 'column';
          }
        });
      });

      // Keep screen awake (if supported)
      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(() => {});
      }
    })();
  </script>
</body>
</html>
